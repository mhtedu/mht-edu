<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 棉花糖教育平台管理后台</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">📚</div>
                <h1 class="login-title">棉花糖教育平台</h1>
                <p class="login-subtitle">管理后台</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" name="username" 
                           placeholder="请输入用户名" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" name="password" 
                           placeholder="请输入密码" required autocomplete="current-password">
                </div>
                
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> 记住我
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block login-btn" id="loginBtn">
                    登录
                </button>
            </form>
            
            <div class="login-footer">
                <p>默认账号: admin / password</p>
                <p class="text-muted">请登录后立即修改密码</p>
            </div>
        </div>
        
        <div class="login-copyright">
            © 2024 棉花糖教育平台 All Rights Reserved
        </div>
    </div>
    
    <script>
        // 登录处理
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            
            try {
                const response = await fetch('/api/admin/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });
                
                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    // 保存token
                    localStorage.setItem('admin_token', data.access_token);
                    localStorage.setItem('admin_user', JSON.stringify(data.user));
                    
                    // 跳转到管理后台
                    window.location.href = 'admin.html';
                } else {
                    alert(data.message || '登录失败，请检查用户名和密码');
                }
            } catch (error) {
                alert('登录失败: ' + error.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
        
        // 检查是否已登录
        const token = localStorage.getItem('admin_token');
        if (token) {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
