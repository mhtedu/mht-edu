<!DOCTYPE html>
<html>

<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover" name="viewport">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no,address=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>教育平台</title>
  <script><%= htmlWebpackPlugin.options.script %></script>
  <script>
    // H5 端根字体大小计算 - 基于 Tailwind 的 16px rem 基准
    // 在 Taro 脚本之后执行，覆盖其字体设置
    (function() {
      var targetFontSize = 16; // 基准字体大小
      var baseWidth = 375; // 基准屏幕宽度
      
      function setRootFontSize() {
        var e = document.documentElement;
        var w = Math.min(e.getBoundingClientRect().width, window.screen.width, 750);
        var x = targetFontSize * w / baseWidth;
        // 限制字体大小在 12-16px 之间
        var fontSize = Math.max(12, Math.min(16, x));
        e.style.fontSize = fontSize + "px";
        return fontSize;
      }
      
      // 立即执行
      setRootFontSize();
      
      // 监听 resize
      window.addEventListener("resize", setRootFontSize);
      
      // 使用 requestAnimationFrame 持续覆盖 Taro 的设置
      var attempts = 0;
      function overrideTaroScript() {
        var current = parseFloat(document.documentElement.style.fontSize) || 0;
        // 如果当前字体大于 18px，说明被 Taro 脚本覆盖了
        if (current > 18) {
          setRootFontSize();
        }
        attempts++;
        // 持续检测 20 次，确保覆盖 Taro 的设置
        if (attempts < 20) {
          requestAnimationFrame(overrideTaroScript);
        }
      }
      requestAnimationFrame(overrideTaroScript);
      
      // DOMContentLoaded 后再次确保
      document.addEventListener("DOMContentLoaded", function() {
        setRootFontSize();
        // 延迟多次执行，确保覆盖
        setTimeout(setRootFontSize, 50);
        setTimeout(setRootFontSize, 100);
        setTimeout(setRootFontSize, 200);
        setTimeout(setRootFontSize, 500);
      });
      
      // window load 后最后确认
      window.addEventListener("load", function() {
        setRootFontSize();
      });
    })();
  </script>
</head>

<body>
  <div id="app">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="lab(2.86037 0.455312 0.568903)"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="
        position: fixed;
        inset: 0;
        margin: auto;
        width: 24px;
        height: 24px;
        animation: __app-loading-spin 1s linear infinite;
      ">
      <path d="M21 12a9 9 0 1 1-6.219-8.56" />
    </svg>
    <style>
      @keyframes __app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
</body>

</html>
